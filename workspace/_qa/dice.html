<!DOCTYPE html>
<html>
<head>
<title>Dice Roller</title>
<script>
function rollDice() {
    const num = document.getElementById('num').value;
    const res = [];

    for (let i=0; i < num; i++) 
        res.push(`<div class='die'>${Math.floor(6 * Math.random()) + 1}</div>`);

    document.getElementById('res').innerHTML = res.join('');
}
</script>
<style>.die {width:80px; height:80px; margin:20px auto; border-radius:40%; font-size:3em; color:#660033; background:#eee;}</style>
</head>
<body>
<h1>Dice Roller</h1>
<p><label for='num'>Number of dice (1-5): <input type='number' id='num' min=1 max=5 value='2'/></label></p>
<button onclick='rollDice()'>Roll</button>
<div id='res'></div>
</body>
</html>
