<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Crumb & Co</title>
    <style>
        body {
            margin: 0;
            font-family: "Arial", sans-serif;
            background-color: #fff3cd;
            color: #4b0082;
        }
        .hero {
            padding: 60px 20px;
            text-align: center;
            background: linear-gradient(135deg, #ffcc00, #ffd700);
        }
        .menu {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }
        .menu-item {
            background: #fff8e1;
            border: 2px solid #ff9933;
            margin: 15px;
            padding: 20px;
            width: 250px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .menu-item h3 {
            color: #8b0000;
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Welcome to Crumb & Co</h1>
        <p>Fresh Baked Goods Since 2020</p>
    </div>
    
    <div class="menu">
        <div class="menu-item">
            <h3>Classic Croissant</h3>
            <p>$5.99</p>
        </div>
        <div class="menu-item">
            <h3>Blueberry Muffin</h3>
            <p>$4.49</p>
        </div>
        <div class="menu-item">
            <h3>Chocolate Cake</h3>
            <p>$6.99</p>
        </div>
    </div>
</body>
</html>
