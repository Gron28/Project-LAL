<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>LOCAL AI LAB</title>
<link rel="stylesheet" href="/tokens.css"/>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font-family:var(--mono);font-size:13px;-webkit-font-smoothing:antialiased}
  body{display:flex;flex-direction:column;height:100vh;overflow:hidden;padding:8px;gap:8px}
  .panel{position:relative;background:var(--panel);border:1px solid var(--edge);border-radius:3px;
    min-height:0;display:flex;flex-direction:column;overflow:hidden}
  .corner{position:absolute;width:7px;height:7px;border:1px solid var(--green);opacity:.6;z-index:2}
  .corner.tl{top:-1px;left:-1px;border-right:0;border-bottom:0}
  .corner.tr{top:-1px;right:-1px;border-left:0;border-bottom:0}
  .corner.bl{bottom:-1px;left:-1px;border-right:0;border-top:0}
  .corner.br{bottom:-1px;right:-1px;border-left:0;border-top:0}
  #hdr{display:flex;align-items:center;gap:14px;border:1px solid var(--edge);border-radius:3px;
    background:var(--panel);padding:0 14px;height:42px;flex:0 0 auto}
  #hdr .logo{color:var(--green);font-weight:700;letter-spacing:.24em;font-size:15px}
  #hdr .sub{color:var(--faint);font-size:9.5px;letter-spacing:.12em}
  #hdr .stat{margin-left:auto;font-size:10px;letter-spacing:.12em;color:var(--dim)}
  #hdr .stat b{color:var(--green)}
  nav{display:flex;gap:8px;flex:0 0 auto}
  nav button{flex:1;background:var(--panel);border:1px solid var(--edge);color:var(--dim);
    padding:9px;border-radius:3px;font-family:var(--mono);font-size:11px;letter-spacing:.18em;
    cursor:pointer;text-transform:uppercase}
  nav button.on{color:var(--bg);background:var(--green);border-color:var(--green);font-weight:700}
  main{flex:1;min-height:0;display:flex;gap:8px}
  .view{flex:1;min-height:0;display:none;gap:8px}
  .view.on{display:flex}
  .ph{display:flex;align-items:center;gap:7px;padding:6px 10px;border-bottom:1px solid var(--edge2);
    font-size:10px;letter-spacing:.14em;color:var(--dim);text-transform:uppercase}
  .ph .t{color:var(--green)} .ph .r{margin-left:auto;color:var(--faint);font-size:9px}
  .bd{flex:1;min-height:0;overflow:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
  label{font-size:9.5px;letter-spacing:.14em;color:var(--faint);text-transform:uppercase;display:block;margin-bottom:4px}
  input,select,textarea{width:100%;background:#0a1512;border:1px solid var(--edge);color:var(--ink);
    font-family:var(--mono);font-size:12px;padding:8px;border-radius:3px}
  textarea{flex:1;min-height:120px;resize:none;line-height:1.5}
  .row{display:flex;gap:10px} .row>div{flex:1}
  button.act{background:var(--green);color:var(--bg);border:0;padding:11px;border-radius:3px;
    font-family:var(--mono);font-weight:700;letter-spacing:.16em;cursor:pointer;text-transform:uppercase}
  button.act:disabled{background:var(--edge);color:var(--faint);cursor:not-allowed}
  button.ghost{background:transparent;border:1px solid var(--edge);color:var(--dim);padding:8px 12px;
    border-radius:3px;font-family:var(--mono);font-size:11px;cursor:pointer;letter-spacing:.12em}
  canvas{width:100%;height:100%;display:block}
  .log{font-size:10.5px;color:var(--dim);line-height:1.6;white-space:pre-wrap;word-break:break-word}
  .msg{padding:8px 10px;border-radius:4px;margin-bottom:8px;line-height:1.5;max-width:88%}
  .msg.u{background:#10261f;align-self:flex-end;border:1px solid var(--edge)}
  .msg.a{background:#0a1512;align-self:flex-start;border:1px solid var(--edge2)}
  .msg .who{font-size:8.5px;letter-spacing:.14em;color:var(--faint);text-transform:uppercase;margin-bottom:3px}
  .chatwrap{flex:1;min-height:0;display:flex;flex-direction:column}
  .chatlog{flex:1;min-height:0;overflow:auto;display:flex;flex-direction:column;padding:4px}
  .empty{color:var(--faint);text-align:center;padding:24px;font-size:10px;letter-spacing:.1em}
  table{width:100%;border-collapse:collapse;font-size:11px}
  td,th{text-align:left;padding:7px 6px;border-bottom:1px solid var(--edge2)}
  th{color:var(--faint);font-size:9px;letter-spacing:.12em;text-transform:uppercase}
  a{color:var(--cyan);text-decoration:none}
  .pill{display:inline-block;padding:2px 8px;border-radius:99px;font-size:9px;letter-spacing:.1em;border:1px solid var(--edge)}
</style>
</head>
<body>
<div id="hdr">
  <span class="logo">◉ LOCAL AI LAB</span>
  <span class="sub">TRAIN · OWN · RUN — VULKAN/llama.cpp · ISOLATED FROM OLLAMA</span>
  <span class="stat" id="stat">—</span>
</div>
<nav>
  <button data-v="train" class="on">▣ Training Grounds</button>
  <button data-v="chat">▶ Chat</button>
  <button data-v="models">▤ Models</button>
</nav>
<main>
  <!-- TRAIN -->
  <div class="view on" id="v-train">
    <div class="panel" style="flex:1">
      <span class="corner tl"></span><span class="corner tr"></span><span class="corner bl"></span><span class="corner br"></span>
      <div class="ph"><span class="t">◆</span> TRAINING GROUNDS <span class="r">drop text → LoRA → GGUF</span></div>
      <div class="bd">
        <div class="row">
          <div><label>Model name</label><input id="t-name" value="mymodel"/></div>
          <div><label>Base</label><select id="t-base"></select></div>
        </div>
        <div class="row">
          <div><label>Steps</label><input id="t-steps" type="number" value="150"/></div>
          <div><label>Learn rate</label><input id="t-lr" value="0.0002"/></div>
        </div>
        <label>Training text (.txt content — paste your data)</label>
        <textarea id="t-text" placeholder="Paste the text you want the model to learn..."></textarea>
        <button class="act" id="t-go">⏵ Train on GPU</button>
      </div>
    </div>
    <div class="panel" style="flex:1.1">
      <span class="corner tl"></span><span class="corner tr"></span><span class="corner bl"></span><span class="corner br"></span>
      <div class="ph"><span class="t">◆</span> LIVE PROGRESS <span class="r" id="t-phase">idle</span></div>
      <div class="bd">
        <div style="height:200px"><canvas id="loss"></canvas></div>
        <div class="log" id="t-log"><div class="empty">— no run yet —</div></div>
      </div>
    </div>
  </div>
  <!-- CHAT -->
  <div class="view" id="v-chat">
    <div class="panel" style="flex:1">
      <span class="corner tl"></span><span class="corner tr"></span><span class="corner bl"></span><span class="corner br"></span>
      <div class="ph"><span class="t">◆</span> CHAT <span class="r" id="c-serving">no model served</span></div>
      <div class="bd" style="overflow:hidden">
        <div class="row" style="flex:0 0 auto">
          <div style="flex:2"><label>Model</label><select id="c-model"></select></div>
          <div style="flex:0 0 auto;display:flex;align-items:flex-end;gap:6px">
            <button class="ghost" id="c-serve">⏻ Serve</button>
          </div>
        </div>
        <div class="chatwrap">
          <div class="chatlog" id="c-log"><div class="empty">Serve a model, then talk to it.</div></div>
          <div class="row" style="flex:0 0 auto;margin-top:8px">
            <div style="flex:1"><input id="c-in" placeholder="Message…" autocomplete="off"/></div>
            <div style="flex:0 0 auto;display:flex;align-items:flex-end"><button class="act" id="c-send" style="padding:8px 16px">Send</button></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <!-- MODELS -->
  <div class="view" id="v-models">
    <div class="panel" style="flex:1">
      <span class="corner tl"></span><span class="corner tr"></span><span class="corner bl"></span><span class="corner br"></span>
      <div class="ph"><span class="t">◆</span> YOUR MODELS <span class="r">trained locally · GGUF</span></div>
      <div class="bd">
        <table><thead><tr><th>Model</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody id="m-rows"><tr><td colspan="3" class="empty">No models yet — train one.</td></tr></tbody></table>
      </div>
    </div>
  </div>
</main>
<script>
const $=s=>document.querySelector(s), $$=s=>document.querySelectorAll(s);
async function getJSON(u){try{return await (await fetch(u)).json()}catch(e){return null}}
async function post(u,b){try{return await (await fetch(u,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b||{})})).json()}catch(e){return{error:String(e)}}}

// tabs
$$('nav button').forEach(b=>b.onclick=()=>{
  $$('nav button').forEach(x=>x.classList.toggle('on',x===b));
  $$('.view').forEach(v=>v.classList.toggle('on',v.id==='v-'+b.dataset.v));
});

let STATE={};
async function refresh(){
  STATE=await getJSON('/api/state')||{};
  const s=STATE.phase==='training'?`<b>TRAINING</b> ${STATE.training}`:(STATE.serving?`<b>SERVING</b> ${STATE.serving}`:'IDLE');
  $('#stat').innerHTML=s;
  // base dropdown
  const tb=$('#t-base'); if(tb.children.length!==(STATE.bases||[]).length){tb.innerHTML=(STATE.bases||[]).map(b=>`<option>${b}</option>`).join('')}
  // model dropdowns + table
  const ms=STATE.models||[];
  const cm=$('#c-model'); const cur=cm.value; cm.innerHTML=ms.map(m=>`<option ${m===STATE.serving?'selected':''}>${m}</option>`).join('')||'<option disabled>— none —</option>'; if(cur&&ms.includes(cur))cm.value=cur;
  $('#c-serving').textContent=STATE.serving?('serving: '+STATE.serving):'no model served';
  $('#m-rows').innerHTML=ms.length?ms.map(m=>`<tr><td style="color:var(--green)">${m}</td>
    <td>${m===STATE.serving?'<span class="pill" style="color:var(--green);border-color:var(--green)">SERVING</span>':'<span class="pill">ready</span>'}</td>
    <td><a href="/api/download?model=${m}">⤓ download .gguf</a></td></tr>`).join(''):'<tr><td colspan="3" class="empty">No models yet — train one.</td></tr>';
  $('#t-go').disabled=!!STATE.training;
}

// ---- training ----
let pollT=null, curName=null;
$('#t-go').onclick=async()=>{
  const text=$('#t-text').value.trim(); if(!text){alert('Paste some training text first.');return}
  const r=await post('/api/train',{name:$('#t-name').value,base:$('#t-base').value,steps:+$('#t-steps').value,lr:+$('#t-lr').value,text});
  if(r.error){alert(r.error);return}
  curName=r.name; $('#t-log').innerHTML=''; $('#t-phase').textContent='starting…';
  if(!pollT)pollT=setInterval(pollTrain,1500);
};
async function pollTrain(){
  if(!curName)return;
  const rows=await getJSON('/api/progress?name='+curName)||[];
  const steps=rows.filter(r=>r.event==='step');
  drawLoss(steps);
  const last=rows[rows.length-1]||{};
  let phase=last.event==='done'?(last.ok?'✓ done — model ready':'✗ failed'):(last.phase||(steps.length?'finetune':'starting'));
  $('#t-phase').textContent=phase;
  $('#t-log').innerHTML=rows.slice(-14).map(r=>{
    if(r.event==='step')return `step ${r.step}/${r.steps}  loss ${r.loss}  (${r.elapsed}s)`;
    if(r.event==='phase')return `▸ phase: ${r.phase}`;
    if(r.event==='done')return r.ok?`✓ DONE → ${r.model} converted to GGUF`:'✗ ERROR';
    if(r.event==='error')return '✗ '+r.msg;
    if(r.event==='model')return `LoRA params: ${(r.trainable_params/1e6).toFixed(1)}M`;
    return JSON.stringify(r);
  }).join('\n');
  if(last.event==='done'||last.event==='error'){clearInterval(pollT);pollT=null;refresh()}
}
function drawLoss(steps){
  const cv=$('#loss');const dpr=devicePixelRatio||1,w=cv.clientWidth,h=cv.clientHeight;
  cv.width=w*dpr;cv.height=h*dpr;const c=cv.getContext('2d');c.scale(dpr,dpr);c.clearRect(0,0,w,h);
  const L=38,R=w-8,T=8,B=h-18;
  c.strokeStyle='#1c4136';c.lineWidth=1;for(let i=0;i<=4;i++){const y=T+(B-T)*i/4;c.beginPath();c.moveTo(L,y);c.lineTo(R,y);c.stroke()}
  if(!steps.length){c.fillStyle='#7fa896';c.font='10px var(--mono)';c.textAlign='center';c.fillText('AWAITING TRAINING',(L+R)/2,(T+B)/2);return}
  const xs=steps.map(s=>s.step),ys=steps.map(s=>s.loss);
  const xmax=Math.max(...xs,1),ymax=Math.max(...ys),ymin=Math.min(...ys);
  const X=v=>L+(R-L)*v/xmax,Y=v=>T+(B-T)*(1-(v-ymin)/((ymax-ymin)||1));
  c.fillStyle='#90c0ac';c.font='9px var(--mono)';c.textAlign='right';
  c.fillText(ymax.toFixed(2),L-3,T+8);c.fillText(ymin.toFixed(2),L-3,B);
  c.strokeStyle='#34ffa6';c.lineWidth=2;c.beginPath();
  steps.forEach((s,i)=>{const x=X(s.step),y=Y(s.loss);i?c.lineTo(x,y):c.moveTo(x,y)});c.stroke();
  const li=steps.length-1;c.fillStyle='#34ffa6';c.beginPath();c.arc(X(xs[li]),Y(ys[li]),3,0,7);c.fill();
}

// ---- chat ----
$('#c-serve').onclick=async()=>{
  const m=$('#c-model').value; if(!m)return;
  $('#c-serving').textContent='serving '+m+'… (first load compiles shaders)';
  const r=await post('/api/serve',{model:m});
  $('#c-serving').textContent=r.ok?('serving: '+r.serving):('error: '+(r.msg||r.error));
  refresh();
};
let msgs=[];
async function send(){
  const t=$('#c-in').value.trim(); if(!t)return;
  if(!STATE.serving){alert('Serve a model first (⏻ Serve).');return}
  $('#c-in').value='';msgs.push({role:'user',content:t});render();
  const r=await post('/api/chat',{messages:msgs,max_tokens:300,temperature:0.6});
  let a='(error)';try{a=r.choices[0].message.content}catch(e){a=r.error||'(no response)'}
  msgs.push({role:'assistant',content:a});render();
}
$('#c-send').onclick=send; $('#c-in').addEventListener('keydown',e=>{if(e.key==='Enter')send()});
function render(){
  $('#c-log').innerHTML=msgs.length?msgs.map(m=>`<div class="msg ${m.role==='user'?'u':'a'}"><div class="who">${m.role}</div>${m.content.replace(/</g,'&lt;')}</div>`).join(''):'<div class="empty">Serve a model, then talk to it.</div>';
  const l=$('#c-log');l.scrollTop=l.scrollHeight;
}

refresh();setInterval(refresh,2500);drawLoss([]);
</script>
</body>
</html>
